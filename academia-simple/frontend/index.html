<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Academia - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .login-box {
            max-width: 380px;
            margin: 100px auto;
            background: #fff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="login-box">
    <h4 class="mb-1">🏋️ Academia FitPro</h4>
    <p class="text-muted small mb-4">Faça login para continuar</p>

    <div id="erro" class="alert alert-danger d-none"></div>

    <div class="mb-3">
        <label class="form-label">Login</label>
        <input type="text" id="login" class="form-control" placeholder="seu login">
    </div>
    <div class="mb-4">
        <label class="form-label">Senha</label>
        <input type="password" id="senha" class="form-control" placeholder="sua senha">
    </div>
    <button class="btn btn-primary w-100" onclick="entrar()">Entrar</button>
</div>

<script>
    const API = 'http://localhost:8080';

    // Se já estiver logado, vai direto pro dashboard
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

    async function entrar() {
        const login = document.getElementById('login').value;
        const senha = document.getElementById('senha').value;

        try {
            const resposta = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, senha })
            });

            if (!resposta.ok) throw new Error('Login ou senha incorretos');

            const dados = await resposta.json();
            localStorage.setItem('token', dados.token); // salva o token
            window.location.href = 'dashboard.html';

        } catch (e) {
            const erro = document.getElementById('erro');
            erro.textContent = e.message;
            erro.classList.remove('d-none');
        }
    }
</script>
</body>
</html>
