<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Academia - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar simples -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🏋️ Academia FitPro</span>
    <button class="btn btn-outline-light btn-sm" onclick="sair()">Sair</button>
</nav>

<!-- Abas de navegação -->
<div class="container mt-4">
    <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
            <a class="nav-link active" href="#" onclick="mostrar('alunos')">Alunos</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#" onclick="mostrar('planos')">Planos</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#" onclick="mostrar('checkins')">Check-ins</a>
        </li>
    </ul>

    <!-- ===== SEÇÃO ALUNOS ===== -->
    <div id="secao-alunos">
        <div class="d-flex justify-content-between mb-3">
            <h5>Alunos</h5>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalAluno" onclick="prepararModalAluno()">
                + Novo Aluno
            </button>
        </div>
        <table class="table table-bordered table-hover">
            <thead class="table-light">
                <tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Plano</th><th>Ativo</th><th>Ações</th></tr>
            </thead>
            <tbody id="corpoAlunos">
                <tr><td colspan="6" class="text-center text-muted">Carregando...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- ===== SEÇÃO PLANOS ===== -->
    <div id="secao-planos" class="d-none">
        <div class="d-flex justify-content-between mb-3">
            <h5>Planos</h5>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalPlano">
                + Novo Plano
            </button>
        </div>
        <table class="table table-bordered table-hover">
            <thead class="table-light">
                <tr><th>Nome</th><th>Valor</th><th>Ações</th></tr>
            </thead>
            <tbody id="corpoPlanos">
                <tr><td colspan="3" class="text-center text-muted">Carregando...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- ===== SEÇÃO CHECK-INS ===== -->
    <div id="secao-checkins" class="d-none">
        <div class="d-flex justify-content-between mb-3">
            <h5>Check-ins</h5>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalCheckin" onclick="carregarAlunosSelect()">
                + Registrar Check-in
            </button>
        </div>
        <table class="table table-bordered table-hover">
            <thead class="table-light">
                <tr><th>Aluno</th><th>Data e Hora</th></tr>
            </thead>
            <tbody id="corpoCheckins">
                <tr><td colspan="2" class="text-center text-muted">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal: Novo/Editar Aluno -->
<div class="modal fade" id="modalAluno" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="tituloModalAluno">Novo Aluno</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="alunoId">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" id="alunoNome" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="alunoEmail" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" id="alunoTelefone" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Plano</label>
                    <select id="alunoPlano" class="form-select">
                        <option value="">Sem plano</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarAluno()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Novo Plano -->
<div class="modal fade" id="modalPlano" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Novo Plano</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" id="planoNome" class="form-control" placeholder="Ex: Mensal">
                </div>
                <div class="mb-3">
                    <label class="form-label">Valor (R$)</label>
                    <input type="number" id="planoValor" class="form-control" step="0.01">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarPlano()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Check-in -->
<div class="modal fade" id="modalCheckin" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Registrar Check-in</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label class="form-label">Aluno</label>
                <select id="checkinAluno" class="form-select">
                    <option value="">Selecione...</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarCheckin()">Registrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

const API = 'http://localhost:8080';
const token = localStorage.getItem('token');

// Redireciona para login se não tiver token
if (!token) window.location.href = 'index.html';

// Função utilitária: faz requisições autenticadas com o token JWT
async function api(url, metodo = 'GET', corpo = null) {
    const opcoes = {
        method: metodo,
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token   // token JWT no cabeçalho
        }
    };
    if (corpo) opcoes.body = JSON.stringify(corpo);

    const resposta = await fetch(API + url, opcoes);

    // 401 = token expirado → volta ao login
    if (resposta.status === 401) sair();

    // 403 = sem permissão → avisa o usuário mas NÃO redireciona
    if (resposta.status === 403) {
        alert('Sem permissão para realizar esta ação.');
        return null;
    }

    if (resposta.ok && metodo !== 'DELETE') return resposta.json();
    return null;
}

function sair() {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
}

// Mostra/esconde seções
function mostrar(secao) {
    ['alunos', 'planos', 'checkins'].forEach(s => {
        document.getElementById('secao-' + s).classList.toggle('d-none', s !== secao);
    });

    // Carrega os dados da seção selecionada
    if (secao === 'alunos')   carregarAlunos();
    if (secao === 'planos')   carregarPlanos();
    if (secao === 'checkins') carregarCheckins();

    // Atualiza a aba ativa
    document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.textContent.toLowerCase().includes(secao));
    });
}

// ===== ALUNOS =====

async function carregarAlunos() {
    const alunos = await api('/alunos');
    const tbody = document.getElementById('corpoAlunos');

    if (!alunos || alunos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Nenhum aluno cadastrado</td></tr>';
        return;
    }

    tbody.innerHTML = alunos.map(a => `
        <tr>
            <td>${a.nome}</td>
            <td>${a.email}</td>
            <td>${a.telefone || '—'}</td>
            <td>${a.plano ? a.plano.nome : '—'}</td>
            <td>${a.ativo ? '<span class="badge bg-success">Ativo</span>' : '<span class="badge bg-secondary">Inativo</span>'}</td>
            <td>
                <button class="btn btn-sm btn-outline-secondary" onclick="editarAluno(${a.id})">Editar</button>
                ${a.ativo ? `<button class="btn btn-sm btn-outline-danger ms-1" onclick="inativarAluno(${a.id})">Inativar</button>` : ''}
            </td>
        </tr>
    `).join('');
}

function prepararModalAluno() {
    document.getElementById('alunoId').value = '';
    document.getElementById('alunoNome').value = '';
    document.getElementById('alunoEmail').value = '';
    document.getElementById('alunoTelefone').value = '';
    document.getElementById('tituloModalAluno').textContent = 'Novo Aluno';
    carregarPlanosNoSelect('alunoPlano');
}

async function editarAluno(id) {
    await carregarPlanosNoSelect('alunoPlano');
    const aluno = await api('/alunos/' + id);

    document.getElementById('alunoId').value    = aluno.id;
    document.getElementById('alunoNome').value  = aluno.nome;
    document.getElementById('alunoEmail').value = aluno.email;
    document.getElementById('alunoTelefone').value = aluno.telefone || '';
    document.getElementById('alunoPlano').value = aluno.plano ? aluno.plano.id : '';
    document.getElementById('tituloModalAluno').textContent = 'Editar Aluno';

    new bootstrap.Modal(document.getElementById('modalAluno')).show();
}

async function salvarAluno() {
    const id = document.getElementById('alunoId').value;
    const dados = {
        nome:     document.getElementById('alunoNome').value,
        email:    document.getElementById('alunoEmail').value,
        telefone: document.getElementById('alunoTelefone').value,
        planoId:  document.getElementById('alunoPlano').value || null
    };

    if (id) await api('/alunos/' + id, 'PUT', dados);
    else    await api('/alunos', 'POST', dados);

    bootstrap.Modal.getInstance(document.getElementById('modalAluno')).hide();
    carregarAlunos();
}

async function inativarAluno(id) {
    if (confirm('Deseja inativar este aluno?')) {
        await api('/alunos/' + id, 'DELETE');
        carregarAlunos();
    }
}

// ===== PLANOS =====

async function carregarPlanos() {
    const planos = await api('/planos');
    const tbody = document.getElementById('corpoPlanos');

    if (!planos || planos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">Nenhum plano cadastrado</td></tr>';
        return;
    }

    tbody.innerHTML = planos.map(p => `
        <tr>
            <td>${p.nome}</td>
            <td>R$ ${Number(p.valor).toFixed(2)}</td>
            <td><button class="btn btn-sm btn-outline-danger" onclick="deletarPlano(${p.id})">Excluir</button></td>
        </tr>
    `).join('');
}

async function salvarPlano() {
    const dados = {
        nome:  document.getElementById('planoNome').value,
        valor: parseFloat(document.getElementById('planoValor').value)
    };
    await api('/planos', 'POST', dados);
    bootstrap.Modal.getInstance(document.getElementById('modalPlano')).hide();
    carregarPlanos();
}

async function deletarPlano(id) {
    if (confirm('Excluir este plano?')) {
        await api('/planos/' + id, 'DELETE');
        carregarPlanos();
    }
}

// ===== CHECK-INS =====

async function carregarCheckins() {
    const checkins = await api('/checkins');
    const tbody = document.getElementById('corpoCheckins');

    if (!checkins || checkins.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted">Nenhum check-in registrado</td></tr>';
        return;
    }

    tbody.innerHTML = checkins.slice().reverse().map(c => `
        <tr>
            <td>${c.aluno ? c.aluno.nome : '—'}</td>
            <td>${new Date(c.dataHora).toLocaleString('pt-BR')}</td>
        </tr>
    `).join('');
}

async function carregarAlunosSelect() {
    const alunos = await api('/alunos/ativos');
    const select = document.getElementById('checkinAluno');
    select.innerHTML = '<option value="">Selecione o aluno</option>' +
        (alunos || []).map(a => `<option value="${a.id}">${a.nome}</option>`).join('');
}

async function salvarCheckin() {
    const alunoId = document.getElementById('checkinAluno').value;
    if (!alunoId) return alert('Selecione um aluno');

    await api(`/checkins?alunoId=${alunoId}`, 'POST');
    bootstrap.Modal.getInstance(document.getElementById('modalCheckin')).hide();
    carregarCheckins();
}

// ===== UTILITÁRIO =====

async function carregarPlanosNoSelect(selectId) {
    const planos = await api('/planos');
    const select = document.getElementById(selectId);
    select.innerHTML = '<option value="">Sem plano</option>' +
        (planos || []).map(p => `<option value="${p.id}">${p.nome} — R$ ${Number(p.valor).toFixed(2)}</option>`).join('');
}

// Carrega alunos ao abrir a página
carregarAlunos();

</script>
</body>
</html>
