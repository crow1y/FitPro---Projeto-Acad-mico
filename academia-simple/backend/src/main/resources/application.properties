# Conexão com o banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/academia_db?serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=root

# JPA: não deixa o Hibernate alterar o banco automaticamente
spring.jpa.hibernate.ddl-auto=none

# Chave secreta usada para assinar os tokens JWT
api.security.token.secret=minha-chave-secreta-academia
